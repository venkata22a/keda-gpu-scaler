site_name: keda-gpu-scaler
site_url: https://keda-gpu-scaler.readthedocs.io
site_description: KEDA External Scaler for NVIDIA GPU metrics
site_author: Pavan Madduri
repo_url: https://github.com/pmady/keda-gpu-scaler
repo_name: pmady/keda-gpu-scaler
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: DESIGN.md
  - Migration Guide: MIGRATION.md
  - Configuration: configuration.md
  - HPC Integration: hpc.md
  - FAQ: FAQ.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Adopters: adopters.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
