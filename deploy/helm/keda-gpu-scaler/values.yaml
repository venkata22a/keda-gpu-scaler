image:
  repository: ghcr.io/pmady/keda-gpu-scaler
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

service:
  type: ClusterIP
  port: 6000

grpc:
  port: 6000

logLevel: info

# Prometheus metrics endpoint. Set enabled: false to disable.
metrics:
  enabled: true
  port: 9090

probes:
  enabled: true
  port: 8081

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

affinity: {}

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# NVML needs privileged access to GPU devices
securityContext:
  privileged: true
  runAsUser: 0

# NVIDIA container runtime handles device mounts automatically.
# Set to "" if your cluster doesn't have the nvidia runtime class.
runtimeClassName: nvidia

# For clusters WITHOUT the nvidia runtime class, enable hostPath
# mounts so NVML can reach the GPU device files directly.
nvmlHostMounts:
  enabled: false
  nvidiactl: /dev/nvidiactl
  nvidiaUvm: /dev/nvidia-uvm
  nvmlLib: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

terminationGracePeriodSeconds: 30
