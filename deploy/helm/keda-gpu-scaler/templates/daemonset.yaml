apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "keda-gpu-scaler.fullname" . }}
  labels:
    {{- include "keda-gpu-scaler.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "keda-gpu-scaler.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "keda-gpu-scaler.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "keda-gpu-scaler.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port={{ .Values.grpc.port }}
            - --log-level={{ .Values.logLevel }}
            {{- if .Values.metrics.enabled }}
            - --metrics-port={{ .Values.metrics.port }}
            {{- else }}
            - --metrics-port=0
            {{- end }}
            {{- if .Values.probes.enabled }}
            - --probe-port={{ .Values.probes.port }}
            {{- else }}
            - --probe-port=0
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.probes.enabled }}
            - name: probes
              containerPort: {{ .Values.probes.port }}
              protocol: TCP
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.nvmlHostMounts.enabled }}
          volumeMounts:
            - name: dev-nvidiactl
              mountPath: {{ .Values.nvmlHostMounts.nvidiactl }}
            - name: dev-nvidia-uvm
              mountPath: {{ .Values.nvmlHostMounts.nvidiaUvm }}
            - name: nvidia-ml
              mountPath: {{ .Values.nvmlHostMounts.nvmlLib }}
              readOnly: true
          {{- end }}
      {{- if .Values.nvmlHostMounts.enabled }}
      volumes:
        - name: dev-nvidiactl
          hostPath:
            path: {{ .Values.nvmlHostMounts.nvidiactl }}
        - name: dev-nvidia-uvm
          hostPath:
            path: {{ .Values.nvmlHostMounts.nvidiaUvm }}
        - name: nvidia-ml
          hostPath:
            path: {{ .Values.nvmlHostMounts.nvmlLib }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
